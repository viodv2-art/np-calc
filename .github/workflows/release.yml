name: Release desktop builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm deps
        run: npm install --no-audit --no-fund

      - name: Verify Tauri CLI
        shell: bash
        run: |
          npx --no-install tauri --version || {
            echo "Tauri CLI missing — reinstalling platform binary"
            npm install --no-save @tauri-apps/cli
            npx --no-install tauri --version
          }

      - name: Build Tauri (direct, verbose)
        shell: bash
        run: npm run tauri:build -- ${{ matrix.args }} --verbose

      - name: List bundle output
        if: always()
        shell: bash
        run: |
          echo "=== Bundle dir contents ==="
          find src-tauri/target -type d -name bundle -exec ls -la {} \; 2>/dev/null || true
          echo "=== All artifacts ==="
          find src-tauri/target -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.app" -o -name "*.tar.gz" -o -name "*.deb" -o -name "*.AppImage" \) 2>/dev/null || true

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.platform }}
          path: |
            src-tauri/target/**/bundle/msi/*.msi
            src-tauri/target/**/bundle/nsis/*.exe
            src-tauri/target/**/bundle/dmg/*.dmg
            src-tauri/target/**/bundle/macos/*.app.tar.gz
          if-no-files-found: warn

      - name: Attach to release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'НП Калькулятор ${{ github.ref_name }}'
          body: 'Автосборка для Windows (.exe / .msi) и macOS (.dmg).'
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            src-tauri/target/**/bundle/msi/*.msi
            src-tauri/target/**/bundle/nsis/*.exe
            src-tauri/target/**/bundle/dmg/*.dmg
            src-tauri/target/**/bundle/macos/*.app.tar.gz
